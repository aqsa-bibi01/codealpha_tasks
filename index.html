<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone — E-Commerce</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <div class="logo">🛍️ ShopZone</div>
    <div class="nav-links">
      <a href="#" onclick="showPage('home')">Home</a>
      <a href="#" onclick="showPage('products')">Products</a>
      <a href="#" onclick="showPage('cart')">🛒 Cart <span id="cartCount">0</span></a>
      <span id="authLinks">
        <a href="#" onclick="showPage('login')">Login</a>
        <a href="#" onclick="showPage('register')">Register</a>
      </span>
      <span id="userInfo" style="display:none">
        <span id="userName"></span>
        <a href="#" onclick="showPage('orders')">My Orders</a>
        <a href="#" onclick="logout()">Logout</a>
      </span>
    </div>
  </nav>

  <!-- HOME PAGE -->
  <div id="page-home" class="page active">
    <div class="hero">
      <h1>Welcome to ShopZone</h1>
      <p>Discover amazing products at great prices</p>
      <button onclick="showPage('products')">Shop Now</button>
    </div>
  </div>

  <!-- PRODUCTS PAGE -->
  <div id="page-products" class="page">
    <div class="filters">
      <input id="searchInput" type="text" placeholder="Search products..." oninput="loadProducts()"/>
      <select id="categoryFilter" onchange="loadProducts()">
        <option value="">All Categories</option>
        <option>Electronics</option><option>Clothing</option>
        <option>Books</option><option>Home</option><option>Sports</option>
      </select>
    </div>
    <div id="productsGrid" class="grid"></div>
  </div>

  <!-- PRODUCT DETAIL PAGE -->
  <div id="page-detail" class="page">
    <div id="productDetail"></div>
  </div>

  <!-- CART PAGE -->
  <div id="page-cart" class="page">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div id="cartTotal"></div>
    <button id="checkoutBtn" onclick="showCheckout()" style="display:none">Proceed to Checkout</button>
  </div>

  <!-- CHECKOUT PAGE -->
  <div id="page-checkout" class="page">
    <h2>Checkout</h2>
    <div class="form-box">
      <input id="street" placeholder="Street Address" />
      <input id="city" placeholder="City" />
      <input id="zip" placeholder="ZIP Code" />
      <input id="country" placeholder="Country" />
      <button onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <!-- ORDERS PAGE -->
  <div id="page-orders" class="page">
    <h2>My Orders</h2>
    <div id="ordersList"></div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="page-login" class="page">
    <div class="form-box">
      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email"/>
      <input id="loginPassword" type="password" placeholder="Password"/>
      <button onclick="login()">Login</button>
      <p>No account? <a href="#" onclick="showPage('register')">Register</a></p>
      <p id="loginMsg" class="msg"></p>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="page-register" class="page">
    <div class="form-box">
      <h2>Register</h2>
      <input id="regName" placeholder="Full Name"/>
      <input id="regEmail" type="email" placeholder="Email"/>
      <input id="regPassword" type="password" placeholder="Password"/>
      <button onclick="register()">Register</button>
      <p>Have an account? <a href="#" onclick="showPage('login')">Login</a></p>
      <p id="regMsg" class="msg"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
