<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TaskFlow — Project Manager</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <nav>
    <div class="logo">📋 TaskFlow</div>
    <div id="navUser"></div>
  </nav>
  <div id="page-auth" class="page active">
    <div class="auth-tabs">
      <button onclick="switchAuth('login')" class="active" id="loginTab">Login</button>
      <button onclick="switchAuth('register')" id="registerTab">Register</button>
    </div>
    <div class="form-box">
      <div id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email"/>
        <input id="loginPass" type="password" placeholder="Password"/>
        <button onclick="login()">Login</button>
        <p id="loginMsg" class="msg"></p>
      </div>
      <div id="registerForm" style="display:none">
        <input id="regName" placeholder="Full Name"/>
        <input id="regEmail" type="email" placeholder="Email"/>
        <input id="regPass" type="password" placeholder="Password"/>
        <button onclick="register()">Create Account</button>
        <p id="regMsg" class="msg"></p>
      </div>
    </div>
  </div>
  <div id="page-dashboard" class="page">
    <div class="dashboard">
      <div class="sidebar-pm">
        <button class="new-btn" onclick="showNewProjectModal()">+ New Project</button>
        <div id="projectList"></div>
      </div>
      <div class="board-area" id="boardArea">
        <div class="empty-state">← Select a project to view tasks</div>
      </div>
    </div>
  </div>
  <!-- New Project Modal -->
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3 id="modalTitle">New Project</h3>
      <div id="modalBody"></div>
      <button onclick="closeModal()" style="background:#999;margin-top:10px">Cancel</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
