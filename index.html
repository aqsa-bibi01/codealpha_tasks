<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SocialHub</title><link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav>
    <div class="logo">🌐 SocialHub</div>
    <div id="navAuth">
      <a href="#" onclick="showPage('feed')">Feed</a>
      <a href="#" onclick="showPage('profile')">Profile</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
    <div id="navGuest">
      <a href="#" onclick="showPage('login')">Login</a>
      <a href="#" onclick="showPage('register')">Sign Up</a>
    </div>
  </nav>
  <div id="page-feed" class="page active">
    <div class="feed-layout">
      <div class="main-feed">
        <div class="compose-box" id="composeBox" style="display:none">
          <textarea id="postContent" placeholder="What's on your mind?"></textarea>
          <button onclick="createPost()">Post</button>
        </div>
        <div id="feedPosts"></div>
      </div>
      <div class="sidebar">
        <h3>Suggested Users</h3>
        <div id="suggestedUsers"></div>
      </div>
    </div>
  </div>
  <div id="page-profile" class="page">
    <div id="profileContent"></div>
  </div>
  <div id="page-login" class="page">
    <div class="form-box">
      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email"/>
      <input id="loginPass" type="password" placeholder="Password"/>
      <button onclick="login()">Login</button>
      <p id="loginMsg" class="msg"></p>
    </div>
  </div>
  <div id="page-register" class="page">
    <div class="form-box">
      <h2>Sign Up</h2>
      <input id="regName" placeholder="Name"/>
      <input id="regUsername" placeholder="Username"/>
      <input id="regEmail" type="email" placeholder="Email"/>
      <input id="regPass" type="password" placeholder="Password"/>
      <button onclick="register()">Sign Up</button>
      <p id="regMsg" class="msg"></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
